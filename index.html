<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
<title>Flux by Michael Ngo — Agentic Strategy OS for TransFi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#0A0C11; --bg-2:#0E1118; --panel:#12151D; --panel-2:#161A23; --elev:#1A1F2A;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.12); --line-strong:rgba(255,255,255,.18);
  --brand:#2E6BFF; --brand-bright:#4C86FF; --brand-deep:#104ff4; --brand-ghost:rgba(46,107,255,.14);
  --teal:#22D3EE; --green:#34D399; --violet:#A78BFA; --amber:#FBBF24; --rose:#FB7185;
  --tx:#EAECEF; --tx-2:#A7AEBB; --tx-3:#6E7686; --tx-4:#4A515F;
  --ok:#34D399; --warn:#FBBF24;
  --r-lg:20px; --r-md:14px; --r-sm:10px; --r-xs:7px;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --disp:'Space Grotesk','Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --shadow:0 24px 60px -18px rgba(0,0,0,.7),0 6px 18px -8px rgba(0,0,0,.55);
  --shadow-sm:0 10px 26px -14px rgba(0,0,0,.65);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
#root{height:100%}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
a{color:inherit;text-decoration:none}
::selection{background:rgba(46,107,255,.35)}
:focus-visible{outline:2px solid var(--brand-bright);outline-offset:2px;border-radius:6px}
.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18);background-clip:padding-box}

/* ============================ SPLASH ============================ */
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.sp-mark{width:44px;height:44px;border-radius:12px;position:relative;background:radial-gradient(120% 120% at 30% 20%,#5b8dff,#2E6BFF 45%,#104ff4 100%);box-shadow:0 0 0 1px rgba(255,255,255,.12),0 12px 30px -8px rgba(46,107,255,.7)}
.sp-mark::after{content:"";position:absolute;inset:0;border-radius:12px;background:conic-gradient(from 210deg,transparent,rgba(255,255,255,.55),transparent 40%);opacity:.5;animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.app{height:100%;position:relative;overflow:hidden}
.dots{position:absolute;inset:0;background-image:radial-gradient(circle at center,rgba(255,255,255,.05) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
.aura{position:absolute;pointer-events:none;filter:blur(60px);opacity:.5;border-radius:50%}

/* ============================ LANDING ============================ */
.landing{position:absolute;inset:0;display:flex;flex-direction:column;overflow:auto}
.landing .aura-1{width:620px;height:620px;left:-160px;top:-220px;background:radial-gradient(circle,rgba(46,107,255,.5),transparent 60%)}
.landing .aura-2{width:520px;height:520px;right:-140px;bottom:-160px;background:radial-gradient(circle,rgba(52,211,153,.28),transparent 60%)}
.landing .aura-3{width:400px;height:400px;right:24%;top:8%;background:radial-gradient(circle,rgba(167,139,250,.22),transparent 62%)}
.topnav{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:20px 28px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mk{width:30px;height:30px;border-radius:9px;position:relative;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,#5b8dff,#2E6BFF 45%,#104ff4 100%);box-shadow:0 0 0 1px rgba(255,255,255,.14),0 8px 20px -6px rgba(46,107,255,.6);flex:none}
.brand .mk svg{position:absolute;inset:0;margin:auto;width:18px;height:18px}
.brand .wm{display:flex;flex-direction:column;line-height:1}
.brand .wm b{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.02em}
.brand .wm span{font-size:10px;color:var(--tx-3);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.nav-r{display:flex;align-items:center;gap:10px}
.pill-ghost{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx-2);padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.02)}
.pill-ghost .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 24px 60px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-bright);background:var(--brand-ghost);border:1px solid rgba(46,107,255,.28);padding:6px 12px;border-radius:999px;margin-bottom:22px}
h1.head{font-family:var(--disp);font-weight:600;font-size:clamp(30px,5.4vw,58px);line-height:1.02;letter-spacing:-.03em;margin:0;max-width:900px}
h1.head em{font-style:normal;background:linear-gradient(120deg,#7aa5ff,#2E6BFF 55%,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--tx-2);font-size:clamp(15px,1.7vw,18px);max-width:640px;margin:20px auto 0;line-height:1.55}
.search-wrap{width:min(720px,100%);margin:34px auto 0}
.search{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(26,31,42,.9),rgba(18,21,29,.9));border:1px solid var(--line-2);border-radius:16px;padding:9px 9px 9px 18px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);backdrop-filter:blur(8px);transition:border-color .2s,box-shadow .2s}
.search:focus-within{border-color:rgba(46,107,255,.55);box-shadow:0 0 0 4px rgba(46,107,255,.14),var(--shadow)}
.search .glyph{color:var(--tx-3);display:flex;flex:none}
.search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;min-width:0;padding:8px 2px}
.search input::placeholder{color:var(--tx-4)}
.go{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,var(--brand-bright),var(--brand));color:#fff;font-weight:600;font-size:14.5px;padding:12px 18px;border-radius:11px;white-space:nowrap;box-shadow:0 8px 22px -8px rgba(46,107,255,.8),inset 0 1px 0 rgba(255,255,255,.25);transition:transform .12s,filter .18s}
.go:hover{filter:brightness(1.06)}
.go:active{transform:translateY(1px)}
.go:disabled{opacity:.55;cursor:default;filter:none}
.hint{margin-top:12px;color:var(--tx-4);font-size:12.5px;font-family:var(--mono)}
.examples{width:min(760px,100%);margin:26px auto 0;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.ex{display:flex;align-items:center;gap:10px;text-align:left;background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:12px;padding:10px 13px;transition:border-color .18s,background .18s,transform .12s;max-width:240px}
.ex:hover{border-color:var(--line-strong);background:rgba(255,255,255,.05);transform:translateY(-1px)}
.ex .ic{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:var(--disp)}
.ex b{font-size:13px;font-weight:600;display:block;line-height:1.2}
.ex span{font-size:11px;color:var(--tx-3);display:block;margin-top:2px}
.kb{position:relative;z-index:2;margin:44px auto 0;width:min(820px,100%);border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(20,23,31,.6),rgba(14,17,24,.4));padding:16px 18px}
.kb-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.kb-h .t{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--tx-2)}
.kb-h .t b{color:var(--tx);font-weight:600}
.kb-count{font-family:var(--mono);font-size:12px;color:var(--brand-bright);background:var(--brand-ghost);padding:4px 10px;border-radius:999px;border:1px solid rgba(46,107,255,.24)}
.kb-grid{display:flex;flex-wrap:wrap;gap:8px}
.kbpat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx-2);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
.kbpat i{width:7px;height:7px;border-radius:2px;flex:none}
.foot{position:relative;z-index:2;padding:22px;text-align:center;color:var(--tx-4);font-size:11.5px}

/* ============================ WORKSPACE ============================ */
.ws{position:absolute;inset:0;display:flex;flex-direction:column;background:radial-gradient(140% 100% at 50% -10%,#0F1219,#0A0C11 60%)}
.topbar{position:relative;z-index:6;display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(10,12,17,.75);backdrop-filter:blur(12px)}
.tb-brand{display:flex;align-items:center;gap:9px;flex:none}
.tb-brand .mk{width:26px;height:26px;border-radius:8px;position:relative;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,#5b8dff,#2E6BFF 45%,#104ff4 100%);box-shadow:0 0 0 1px rgba(255,255,255,.14);flex:none}
.tb-brand .mk svg{position:absolute;inset:0;margin:auto;width:15px;height:15px}
.tb-brand b{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:-.02em}
.divv{width:1px;height:22px;background:var(--line);flex:none}
.client-chip{display:flex;align-items:center;gap:10px;min-width:0;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:6px 12px 6px 6px}
.client-chip .av{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;font-family:var(--disp);color:#07121f}
.client-chip .meta{min-width:0}
.client-chip .meta b{font-size:13px;font-weight:600;display:block;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.client-chip .meta span{font-size:10.5px;color:var(--tx-3);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.progress-mini{display:flex;align-items:center;gap:10px;margin-left:auto}
.pbar{width:150px;height:6px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--teal));transition:width .5s ease;box-shadow:0 0 10px rgba(46,107,255,.6)}
.pcount{font-family:var(--mono);font-size:12px;color:var(--tx-2);white-space:nowrap}
.mode-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--tx-3);border:1px solid var(--line);border-radius:999px;padding:5px 9px}
.mode-pill .dot{width:6px;height:6px;border-radius:50%}
.tb-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--tx-2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;background:rgba(255,255,255,.02);transition:border-color .15s,color .15s,background .15s}
.tb-btn:hover{border-color:var(--line-strong);color:var(--tx);background:rgba(255,255,255,.05)}
.tb-btn.primary{color:#fff;border-color:transparent;background:linear-gradient(180deg,var(--brand-bright),var(--brand))}
.canvas{position:relative;flex:1;overflow:hidden;touch-action:none;cursor:grab;background-image:radial-gradient(circle at center,rgba(255,255,255,.045) 1px,transparent 1px);background-size:28px 28px}
.canvas.grabbing{cursor:grabbing}
.canvas .aura-c{position:absolute;width:900px;height:900px;left:50%;top:-10%;transform:translateX(-50%);background:radial-gradient(circle,rgba(46,107,255,.12),transparent 60%);filter:blur(40px);pointer-events:none}
.world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
.wires{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
.node{position:absolute;transform:translate(-50%,-50%);width:300px}
.node.dragging{z-index:20}
.card{position:relative;border-radius:var(--r-md);background:linear-gradient(180deg,rgba(24,29,39,.96),rgba(16,20,28,.96));border:1px solid var(--line-2);box-shadow:var(--shadow-sm);overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .15s}
.card:hover{border-color:var(--line-strong)}
.card.sel{border-color:color-mix(in srgb,var(--ac) 70%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--ac) 50%,transparent),0 22px 50px -18px rgba(0,0,0,.7)}
.card .topline{height:3px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.9}
.card-h{display:flex;align-items:center;gap:11px;padding:13px 14px 11px}
.ag-ic{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;position:relative;background:color-mix(in srgb,var(--ac) 15%,transparent);border:1px solid color-mix(in srgb,var(--ac) 35%,transparent);color:var(--ac)}
.ag-ic svg{width:18px;height:18px}
.ag-tt{flex:1;min-width:0}
.ag-tt b{font-size:14px;font-weight:600;display:block;line-height:1.15;font-family:var(--disp);letter-spacing:-.01em}
.ag-tt span{font-size:11px;color:var(--tx-3);display:block;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:999px;flex:none}
.status.queued{color:var(--tx-3);background:rgba(255,255,255,.05)}
.status.run{color:var(--ac);background:color-mix(in srgb,var(--ac) 15%,transparent)}
.status.done{color:var(--ok);background:rgba(52,211,153,.14)}
.status.err{color:var(--rose);background:rgba(251,113,133,.14)}
.status .sp{width:9px;height:9px;border-radius:50%;border:1.6px solid currentColor;border-top-color:transparent;animation:spin .7s linear infinite}
.status .dt{width:6px;height:6px;border-radius:50%;background:currentColor}
.card-b{padding:2px 14px 14px}
.log{border-top:1px solid var(--line);margin-top:2px;padding-top:10px;display:flex;flex-direction:column;gap:6px}
.log-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--tx-2);line-height:1.35;opacity:0;transform:translateY(4px);animation:logIn .35s ease forwards}
@keyframes logIn{to{opacity:1;transform:none}}
.log-row .lk{color:var(--ac);flex:none;margin-top:1px;font-family:var(--mono);font-size:10px}
.log-row.muted{color:var(--tx-4)}
.res{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);padding:11px 12px;animation:logIn .4s ease}
.res .rl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx-4);margin-bottom:6px}
.res .rv{font-size:13px;color:var(--tx);line-height:1.4}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:7px;background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac);border:1px solid color-mix(in srgb,var(--ac) 26%,transparent)}
.viewbtn{margin-top:11px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--tx);border:1px solid var(--line-2);border-radius:9px;padding:9px;background:rgba(255,255,255,.03);transition:border-color .15s,background .15s}
.viewbtn:hover{border-color:color-mix(in srgb,var(--ac) 55%,transparent);background:color-mix(in srgb,var(--ac) 10%,transparent)}
.strip{display:flex;align-items:center;gap:2px;flex-wrap:wrap;margin-top:4px}
.strip .chip{font-size:10.5px;font-weight:600;padding:5px 8px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid var(--line);white-space:nowrap}
.strip .chip.tf{background:color-mix(in srgb,var(--brand) 20%,transparent);border-color:color-mix(in srgb,var(--brand) 40%,transparent);color:var(--brand-bright)}
.strip .arw{color:var(--tx-4);flex:none;display:flex}
.orch{width:330px}
.orch .card{background:linear-gradient(180deg,rgba(22,31,52,.97),rgba(14,19,30,.97));border-color:rgba(46,107,255,.35)}
.orch .halo{position:absolute;inset:-2px;border-radius:16px;background:radial-gradient(120% 120% at 50% 0,rgba(46,107,255,.5),transparent 60%);filter:blur(14px);opacity:.6;z-index:-1;pointer-events:none}
.plan{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.plan-row{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--tx-2);padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.025);border:1px solid var(--line)}
.plan-row .n{width:18px;height:18px;border-radius:6px;flex:none;display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:600;color:#07121f}
.plan-row.pending{opacity:.5}
.plan-row .st{margin-left:auto;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;color:var(--tx-3)}
.deliv{width:340px}
.deliv .card{background:linear-gradient(180deg,rgba(20,32,26,.97),rgba(13,20,17,.97));border-color:rgba(52,211,153,.32)}
.deliv.locked .card{opacity:.62;filter:saturate(.6)}
.big-cta{margin-top:12px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:14px;color:#04140d;padding:13px;border-radius:11px;background:linear-gradient(180deg,#5fe6b4,var(--green));box-shadow:0 10px 24px -10px rgba(52,211,153,.7);transition:transform .12s,filter .16s;font-family:var(--disp)}
.big-cta:hover{filter:brightness(1.05)}
.big-cta:active{transform:translateY(1px)}
.big-cta:disabled{opacity:.5;cursor:default;box-shadow:none;filter:grayscale(.4)}
.ctrls{position:absolute;left:16px;bottom:16px;z-index:6;display:flex;flex-direction:column;gap:8px}
.ctrls .grp{display:flex;flex-direction:column;background:rgba(16,20,28,.9);border:1px solid var(--line);border-radius:12px;overflow:hidden;backdrop-filter:blur(10px)}
.cbtn{width:38px;height:38px;display:grid;place-items:center;color:var(--tx-2);transition:background .15s,color .15s}
.cbtn:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.cbtn+.cbtn{border-top:1px solid var(--line)}
.zlabel{font-family:var(--mono);font-size:10px;color:var(--tx-3);text-align:center;padding:4px 0;border-top:1px solid var(--line)}
.legend{position:absolute;right:16px;bottom:16px;z-index:5;display:flex;gap:12px;background:rgba(16,20,28,.82);border:1px solid var(--line);border-radius:11px;padding:9px 13px;backdrop-filter:blur(10px);font-size:11px;color:var(--tx-3)}
.legend .li{display:flex;align-items:center;gap:6px}
.legend .li i{width:8px;height:8px;border-radius:2px}
.scrim{position:absolute;inset:0;z-index:40;background:rgba(5,7,10,.55);backdrop-filter:blur(2px);opacity:0;animation:fade .2s ease forwards}
@keyframes fade{to{opacity:1}}
.panel{position:absolute;top:0;right:0;bottom:0;width:min(560px,100%);z-index:50;background:linear-gradient(180deg,var(--panel-2),var(--panel));border-left:1px solid var(--line-2);box-shadow:-30px 0 70px -30px rgba(0,0,0,.8);display:flex;flex-direction:column;transform:translateX(100%);animation:slideIn .32s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes slideIn{to{transform:none}}
.panel-h{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.panel-h .ic{width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;background:color-mix(in srgb,var(--ac) 15%,transparent);border:1px solid color-mix(in srgb,var(--ac) 34%,transparent);color:var(--ac)}
.panel-h .ic svg{width:20px;height:20px}
.panel-h .tt{flex:1;min-width:0}
.panel-h .tt b{font-family:var(--disp);font-size:16px;font-weight:600;display:block}
.panel-h .tt span{font-size:12px;color:var(--tx-3)}
.xbtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--tx-3);border:1px solid var(--line);transition:.15s}
.xbtn:hover{color:var(--tx);border-color:var(--line-strong);background:rgba(255,255,255,.05)}
.panel-b{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
.sec-t{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-4);margin:0 0 9px}
.field{border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);padding:14px}
.kv{display:flex;gap:10px;padding:7px 0;font-size:13.5px;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none;padding-bottom:0}
.kv:first-child{padding-top:0}
.kv .k{color:var(--tx-3);width:120px;flex:none}
.kv .v{color:var(--tx);flex:1}
.kv .v a{color:var(--brand-bright);border-bottom:1px solid rgba(76,134,255,.35)}
.dossier-desc{font-size:14px;color:var(--tx-2);line-height:1.6}
.person{display:flex;gap:12px;padding:13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02)}
.person+.person{margin-top:10px}
.person .pav{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;font-weight:700;font-family:var(--disp);font-size:15px;color:#0a0f18}
.person .pb{flex:1;min-width:0}
.person .pb .nm{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.person .pb .rl{font-size:12.5px;color:var(--tx-2);margin-top:2px}
.conf{font-size:9.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:5px}
.conf.high{color:var(--ok);background:rgba(52,211,153,.14)}
.conf.med{color:var(--amber);background:rgba(251,191,36,.14)}
.p-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chipbtn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;color:var(--tx-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:rgba(255,255,255,.02);transition:.15s}
.chipbtn:hover{color:var(--tx);border-color:var(--line-strong);background:rgba(255,255,255,.05)}
.chipbtn svg{width:13px;height:13px}
.caveat{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:var(--amber);background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:9px;padding:9px 11px;line-height:1.4}
.email{border:1px solid var(--line-2);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.015)}
.email-h{padding:14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
.email-h .row{display:flex;gap:10px;font-size:13px;padding:4px 0;align-items:baseline}
.email-h .row .lb{color:var(--tx-4);width:52px;flex:none;font-size:12px}
.email-h .row .vl{color:var(--tx);flex:1}
.email-h .subj{font-weight:600;font-family:var(--disp);font-size:15px}
.email-body{padding:16px;font-size:13.5px;line-height:1.62;color:var(--tx-2);white-space:pre-wrap;font-family:var(--sans)}
.email-actions{display:flex;gap:9px;padding:0 2px}
.btn-solid{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13.5px;color:#fff;padding:12px;border-radius:11px;background:linear-gradient(180deg,var(--brand-bright),var(--brand));box-shadow:0 8px 22px -10px rgba(46,107,255,.7);transition:transform .12s,filter .16s}
.btn-solid:hover{filter:brightness(1.06)}.btn-solid:active{transform:translateY(1px)}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13.5px;color:var(--tx);padding:12px 16px;border-radius:11px;border:1px solid var(--line-2);background:rgba(255,255,255,.02);transition:.15s}
.btn-outline:hover{border-color:var(--line-strong);background:rgba(255,255,255,.05)}
.play{border:1px solid var(--line);border-radius:12px;padding:14px;background:linear-gradient(180deg,rgba(52,211,153,.06),rgba(255,255,255,.01))}
.play .pt{font-family:var(--disp);font-weight:600;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.play p{margin:0;color:var(--tx-2);font-size:13.5px;line-height:1.6}
.valgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.valcard{border:1px solid var(--line);border-radius:11px;padding:12px;background:rgba(255,255,255,.02)}
.valcard .num{font-family:var(--disp);font-weight:700;font-size:20px;background:linear-gradient(120deg,#7aa5ff,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent}
.valcard .lb{font-size:11.5px;color:var(--tx-3);margin-top:3px}
.seqwrap{border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.015);padding:10px;overflow:auto}
.seqwrap svg{display:block;min-width:100%}
.seq-note{font-size:11.5px;color:var(--tx-3);margin-top:8px;display:flex;align-items:flex-start;gap:7px;line-height:1.4}

/* ============================ MULTI-COMPANY TABLE ============================ */
.mwrap{position:relative;flex:1;overflow:auto;padding:16px 16px 28px}
.mintro{display:flex;align-items:center;gap:10px;margin:2px 2px 14px;color:var(--tx-2);font-size:13px}
.mintro b{color:var(--tx);font-family:var(--disp)}
.mintro .tag{--ac:var(--violet)}
.mhead,.mrow{display:grid;grid-template-columns:minmax(210px,1.25fr) 1.15fr 1fr 1.15fr;gap:10px}
.mhead{padding:0 4px 8px}
.mth{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-4)}
.mrow{margin-bottom:10px}
.mcell{text-align:left;border:1px solid var(--line-2);border-radius:13px;background:linear-gradient(180deg,rgba(24,29,39,.92),rgba(16,20,28,.92));padding:12px 13px;display:flex;flex-direction:column;gap:8px;min-height:104px;transition:border-color .16s,background .16s,transform .12s;position:relative}
button.mcell:hover{border-color:color-mix(in srgb,var(--ac,#4C86FF) 55%,transparent);background:linear-gradient(180deg,rgba(28,34,46,.95),rgba(18,22,30,.95));transform:translateY(-1px)}
.mcell .mlab{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--tx-4);display:flex;align-items:center;gap:6px}
.mcell .mlab svg{color:var(--ac,var(--tx-3))}
.mcell .mval{font-size:12.5px;color:var(--tx-2);line-height:1.4}
.mcell .mval b{color:var(--tx);font-weight:600}
.mopen{margin-top:auto;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--ac,var(--brand-bright))}
.mspin{display:flex;align-items:center;gap:8px;color:var(--tx-3);font-size:12px;margin:auto 0}
.mspin i{width:11px;height:11px;border-radius:50%;border:1.8px solid var(--ac,var(--brand-bright));border-top-color:transparent;animation:spin .7s linear infinite;flex:none}
.mco{display:flex;gap:11px;align-items:flex-start}
.mco .av{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;font-weight:700;font-family:var(--disp);font-size:14px;color:#07121f}
.mco .nm{font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.2}
.mco .ind{font-size:11.5px;color:var(--tx-3);margin-top:2px}
.mactions{display:flex;gap:7px;margin-top:auto;flex-wrap:wrap}
@media (max-width:900px){
  .mhead{display:none}
  .mrow{grid-template-columns:1fr 1fr;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .mcell.company{grid-column:1/-1;min-height:0}
}
@media (max-width:560px){ .mrow{grid-template-columns:1fr} .mcell{min-height:0} }

/* ============================ FIX DIAGRAM ============================ */
.fixtoggle{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--brand-bright);border:1px dashed rgba(46,107,255,.45);border-radius:10px;padding:10px;background:rgba(46,107,255,.05);transition:.15s;margin-top:10px}
.fixtoggle:hover{background:rgba(46,107,255,.1);border-style:solid}
.fixbox{margin-top:10px;border:1px solid rgba(46,107,255,.32);border-radius:12px;padding:12px;background:linear-gradient(180deg,rgba(46,107,255,.08),rgba(46,107,255,.02));animation:logIn .3s ease}
.fixbox textarea{width:100%;min-height:76px;background:rgba(5,8,14,.5);border:1px solid var(--line-2);border-radius:9px;color:var(--tx);padding:10px 11px;font-family:var(--sans);font-size:13px;line-height:1.5;resize:vertical;outline:none;box-sizing:border-box}
.fixbox textarea:focus{border-color:rgba(46,107,255,.6)}
.fixbox textarea::placeholder{color:var(--tx-4)}
.fixrow{display:flex;gap:8px;margin-top:9px;align-items:center}
.fixhint{font-size:11px;color:var(--tx-4);line-height:1.4;margin-top:8px}
.fixgo{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:12.5px;color:#fff;padding:9px 14px;border-radius:9px;background:linear-gradient(180deg,var(--brand-bright),var(--brand));transition:.15s}
.fixgo:disabled{opacity:.55;cursor:default}
.fixgo .sp{width:11px;height:11px;border-radius:50%;border:1.8px solid #fff;border-top-color:transparent;animation:spin .7s linear infinite}

/* ============================ PRODUCT CHIPS ============================ */
.prodrow{display:flex;flex-wrap:wrap;gap:8px}
.prodchip{display:flex;flex-direction:column;gap:2px;border:1px solid rgba(46,107,255,.28);border-radius:10px;padding:8px 11px;background:rgba(46,107,255,.07);flex:1 1 150px;min-width:0}
.prodchip b{font-size:12px;color:var(--tx);font-weight:600}
.prodchip span{font-size:10.5px;color:var(--tx-3);line-height:1.35}

.toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);z-index:80;display:flex;align-items:center;gap:9px;background:rgba(18,22,30,.96);border:1px solid var(--line-2);border-radius:11px;padding:11px 15px;font-size:13px;box-shadow:var(--shadow);opacity:0;animation:toastIn .25s ease forwards}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%)}}
.toast .ok{color:var(--ok);display:flex}
.grip{display:none}

/* byline */
.tb-brand .byline{font-size:10px;color:var(--tx-3);letter-spacing:.05em;white-space:nowrap;margin-left:1px}

/* ============================ MULTI TABLE ============================ */
.mwrap{position:relative;flex:1;overflow:auto;padding:26px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.mhead{position:relative;z-index:2;width:min(1060px,100%)}
.mhead h2{font-family:var(--disp);font-size:clamp(18px,2.6vw,23px);font-weight:600;letter-spacing:-.02em;margin:0}
.mhead p{color:var(--tx-3);font-size:13.5px;margin:6px 0 0;line-height:1.5}
.mtable{position:relative;z-index:2;width:min(1060px,100%);border:1px solid var(--line-2);border-radius:16px;background:linear-gradient(180deg,rgba(22,26,35,.85),rgba(15,18,25,.85));overflow:hidden;box-shadow:var(--shadow-sm)}
.mrow{display:grid;grid-template-columns:1.45fr 1.35fr 1.1fr 1.45fr 54px;border-top:1px solid var(--line)}
.mrow.hd{border-top:none;background:rgba(255,255,255,.03)}
.mrow.hd .mc{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--tx-4);padding:11px 14px}
.mc{padding:13px 14px;min-width:0;display:flex;align-items:center;gap:10px;text-align:left;border-left:1px solid var(--line)}
.mc:first-child{border-left:none}
button.mc{transition:background .15s}
button.mc:hover:not(:disabled){background:rgba(255,255,255,.045)}
button.mc:disabled{cursor:default}
.mc .cav{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:12px;color:#07121f}
.mc .ct{min-width:0;flex:1}
.mc .ct b{display:block;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
.mc .ct span{display:block;font-size:11px;color:var(--tx-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mc .go2{margin-left:auto;color:var(--tx-4);flex:none;display:flex}
.mcell-mini{font-size:12px;color:var(--tx-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mspin{width:13px;height:13px;border-radius:50%;border:1.8px solid var(--tx-4);border-top-color:var(--brand-bright);animation:spin .7s linear infinite;flex:none}
@media (max-width:760px){
  .mrow{grid-template-columns:1fr}
  .mrow.hd{display:none}
  .mc{border-left:none;border-top:1px dashed var(--line)}
  .mrow .mc:first-child{border-top:none}
  .mc.msend{justify-content:flex-start !important}
  .mc.msend::after{content:"Open full strategy";font-size:12.5px;font-weight:600}
}

/* ============================ FIX-DIAGRAM EDITOR ============================ */
.fixer{margin-top:10px;border:1px solid rgba(76,134,255,.32);border-radius:12px;background:rgba(46,107,255,.06);padding:12px;animation:logIn .3s ease}
.fixer textarea{width:100%;min-height:66px;resize:vertical;background:rgba(10,13,19,.7);border:1px solid var(--line-2);border-radius:9px;color:var(--tx);font-family:var(--sans);font-size:13px;line-height:1.5;padding:10px;outline:none}
.fixer textarea:focus{border-color:rgba(76,134,255,.5)}
.fixer textarea::placeholder{color:var(--tx-4)}
.fixer .fr{display:flex;gap:8px;margin-top:9px;align-items:center}
.fix-err{font-size:12px;color:var(--rose);margin-top:8px;line-height:1.4}

@media (max-width:820px){
  .kb{display:none}.legend{display:none}.sub{font-size:15px}
  .ex{max-width:none;flex:1 1 100%}
}
@media (max-width:680px){
  body{font-size:14.5px}
  .topnav{padding:14px 16px}
  .brand .wm span{display:none}
  .hero{padding:8px 18px 40px}
  .search{padding:8px 8px 8px 14px}
  .go span{display:none}.go{padding:12px}
  .examples{margin-top:20px}
  .topbar{gap:8px;padding:10px 12px}
  .tb-brand b{display:none}
  .client-chip .meta b{max-width:130px}.client-chip .meta span{max-width:130px}
  .progress-mini{gap:7px}.pbar{width:70px}
  .mode-pill span{display:none}.mode-pill{padding:6px}
  .tb-btn span{display:none}.tb-btn{padding:9px 10px}
  .panel{top:auto;left:0;right:0;bottom:0;width:100%;height:88%;border-left:none;border-top:1px solid var(--line-2);border-radius:20px 20px 0 0;transform:translateY(100%);animation:sheetIn .34s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes sheetIn{to{transform:none}}
  .grip{display:block;width:38px;height:4px;border-radius:999px;background:var(--line-strong);margin:9px auto 0}
  .ctrls{left:12px;bottom:12px}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.04s !important}
  .wire-anim{animation:none !important}
}
</style>
</head>

/* ============================ HELPERS ============================ */
function initials(name){
  if(!name) return "?";
  const w=name.replace(/[^A-Za-z0-9À-ÿ &]/g,"").trim().split(/\s+/).filter(Boolean);
  if(w.length===1) return w[0].slice(0,2).toUpperCase();
  return (w[0][0]+w[w.length-1][0]).toUpperCase();
}
function hostOf(url){ try{ return new URL(url).hostname.replace(/^www\./,""); }catch(e){ return (url||"").replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0]; } }
function normUrl(u){
  u=(u||"").trim();
  if(!u) return "";
  if(!/^https?:\/\//i.test(u)) u="https://"+u;
  return u;
}
function copyText(t){
  try{
    if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(t); return true; }
  }catch(e){}
  try{
    const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); return true;
  }catch(e){ return false; }
}
function linkedinSearch(name,company){
  const q=encodeURIComponent([name,company].filter(Boolean).join(" "));
  return "https://www.linkedin.com/search/results/people/?keywords="+q;
}
function instColor(inst){
  const k=(inst||"").toLowerCase();
  if(k.includes("eurxt")) return "var(--brand-bright)";
  if(k.includes("usdt")||k.includes("usdc")||k.includes("stablecoin")||k.includes("usd")) return "var(--green)";
  if(k.includes("qr")||k.includes("payout")) return "var(--teal)";
  if(k.includes("bank")||k.includes("data")||k.includes("ecosystem")||k.includes("recon")) return "var(--violet)";
  return "#E5C07B"; // fiat / eur / local currency
}

function titleCase(s){ return s.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase()); }
function guessName(host){
  const label=(host||"company").split(".")[0]||"company";
  return titleCase(label);
}
function pickPattern(u){
  const s=u.toLowerCase();
  if(/remit|payout|disburse|wallet|cash/.test(s)) return "payout";
  if(/trade|fx|prop|fund|broker|invest|capital|market\b/.test(s)) return "prop";
  if(/bank|stable|coin|euro|usd|mint|token|chain/.test(s)) return "issuer";
  if(/shop|store|commerce|market|checkout|subscrib|game/.test(s)) return "marketplace";
  return "exchange";
}

async function callClaude(prompt, {search=false, maxTokens=2000}={}){
  const body={ model:MODEL, max_tokens:maxTokens, messages:[{role:"user",content:prompt}] };
  if(search) body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  if(!res.ok){ throw new Error("api "+res.status); }
  const data=await res.json();
  if(!data || !Array.isArray(data.content)) throw new Error("bad payload");
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function extractJSON(text){
  if(!text) throw new Error("empty");
  let cand=text;
  const fence=text.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fence) cand=fence[1];
  cand=cand.trim();
  const open=cand.search(/[\[{]/);
  if(open<0) throw new Error("no json");
  const openCh=cand[open], closeCh=openCh==="{"?"}":"]";
  let depth=0,end=-1;
  for(let i=open;i<cand.length;i++){ const c=cand[i]; if(c===openCh)depth++; else if(c===closeCh){depth--; if(depth===0){end=i;break;}} }
  if(end<0) throw new Error("unbalanced");
  return JSON.parse(cand.slice(open,end+1));
}
function sanitizeFlow(j){
  if(!j||!Array.isArray(j.participants)||!Array.isArray(j.steps)) throw new Error("bad flow");
  j.participants=j.participants.slice(0,5);
  j.participants.forEach(p=>{ if(!p.short) p.short=(p.name||"").slice(0,14); if(!p.kind) p.kind="ext"; });
  const n=j.participants.length;
  j.steps=j.steps.filter(s=>Number.isInteger(s.from)&&Number.isInteger(s.to)&&s.from>=0&&s.from<n&&s.to>=0&&s.to<n).slice(0,6);
  if(!j.steps.length) throw new Error("bad steps");
  j.steps.forEach(s=>{ if(!s.instrument) s.instrument="Fiat"; });
  return j;
}

const LOGS = {
  client:["Fetching page content","Extracting named entities","Filtering publisher / news source","Detecting primary subject vs mentions","Matching business-model pattern"],
  flow:["Reading business model","Selecting TransFi products","Mapping participants","Sequencing money movement","Composing flow diagram"],

  email:["Loading client context","Drafting the hook","Injecting products + flow","Polishing tone for executives"],
};
const MULTI_ACCENTS=["#4C86FF","#34D399","#22D3EE","#FBBF24"];

async function runAgent(id, task, H, {logs, minMs=1600}={}){
  H.setAgent(id,{status:"run"});
  let i=0; const lines=logs||LOGS[id]||[];
  const tick=setInterval(()=>{ if(i<lines.length){ H.log(id,lines[i]); i++; } }, 620);
  const started=Date.now();
  try{
    const result=await task();
    const wait=Math.max(0, minMs-(Date.now()-started));
    await sleep(wait);
    clearInterval(tick);
    while(i<Math.min(lines.length,3)){ H.log(id,lines[i]); i++; }
    H.setAgent(id,{status:"done",result});
    return result;
  }catch(e){ clearInterval(tick); H.setAgent(id,{status:"err"}); throw e; }
}

async function offlineRun(url,H,reason){
  H.setMode("offline");
  const g=buildGeneric(url);
  const client=g.client;
  H.setAgent("client",{status:"done",result:client});
  if(reason) H.orchLog(reason);
  H.setClient(client);
  H.setOrch({status:"done"});
  const [fRes,ctRes]=await Promise.all([
    runAgent("flow",()=>sleep(1500).then(()=>g.flow),H,{}),
    runAgent("contacts",()=>sleep(1400).then(()=>g.contacts),H,{}),
  ]);
  const eRes=await runAgent("email",()=>sleep(1300).then(()=>g.email),H,{});
  H.finish({mode:"offline", client, flow:fRes, contacts:ctRes, email:eRes, play:g.play});
}

async function runOrchestration(url, H){

      H.setMulti(example.companies);
      for(let i=0;i<example.companies.length;i++){

      }

      return;
    }
    // ---- CURATED SINGLE (instant, no API) ----

    await sleep(650); H.orchLog("Parsing entities");
    await sleep(500);
    if(/coindesk/i.test(url)) H.orchLog("Publisher filtered: coindesk.com");
    const client={...example.client, accent:example.accent};
    H.orchLog("Prospect resolved: "+client.name);
    H.setClient(client);
    await sleep(450); H.setOrch({status:"done"});
    await runAgent("client",()=>sleep(900).then(()=>client),H,{});
    const [fRes,ctRes]=await Promise.all([
      runAgent("flow",()=>sleep(1600).then(()=>example.flow),H,{}),
      runAgent("contacts",()=>sleep(1500).then(()=>example.contacts),H,{}),
    ]);
    const eRes=await runAgent("email",()=>sleep(1400).then(()=>example.email),H,{});
    H.finish({mode:"curated", client, flow:fRes, contacts:ctRes, email:eRes, play:example.play});
    return;
  }

  // ---- LIVE (API) with OFFLINE fallback ----
  H.orchLog("Searching the web");
  let disc;
  try{
    disc=await runAgent("client",()=>liveDiscover(url),H,{minMs:2200});
  }catch(e){
    await offlineRun(url,H,"Live analysis unavailable — using offline blueprint");
    return;
  }
  const comps=(disc.companies||[]).slice(0,4);
  if(!comps.length){ await offlineRun(url,H,"No prospect found — using offline blueprint"); return; }
  H.setMode("live");
  if(disc.publisher) H.orchLog("Publisher filtered: "+disc.publisher);

  if(comps.length===1){
    // ---- SINGLE LIVE ----
    const client={...comps[0], accent:"#4C86FF"};
    H.setAgent("client",{result:client});
    H.setClient(client);
    H.orchLog("Prospect resolved: "+client.name);
    H.setOrch({status:"done"});
    const results=await Promise.allSettled([
      runAgent("flow",()=>liveFlow(client),H,{minMs:2000}),
      runAgent("contacts",()=>liveContacts(client),H,{minMs:2000}),
    ]);
    const flow = results[0].status==="fulfilled" ? results[0].value : genericFlowFor(client);
    if(results[0].status!=="fulfilled") H.setAgent("flow",{status:"done",result:flow});
    const contacts = results[1].status==="fulfilled" ? results[1].value : genericContactsFor(client);
    if(results[1].status!=="fulfilled") H.setAgent("contacts",{status:"done",result:contacts});
    let email;
    try{ email=await runAgent("email",()=>liveEmail(client,flow),H,{minMs:1800}); }
    catch(e){ email=genericEmailFor(client,flow); H.setAgent("email",{status:"done",result:email}); }
    H.finish({mode:"live", client, flow, contacts, email, play:client.play||genericPlayFor(client)});
    return;
  }

  // ---- MULTI LIVE (round-up / listicle) ----
  const list=comps.map((c,i)=>({...c, accent:MULTI_ACCENTS[i%MULTI_ACCENTS.length]}));
  H.setAgent("client",{result:{name:list.length+" prospects found",pattern:"round-up article"}});
  H.orchLog(list.length+" companies detected — building a strategy for each");
  H.setOrch({status:"done"});
  H.setMulti(list);
  for(let i=0;i<list.length;i++){
    const c=list[i];
    H.updateStrategy(i,{status:"run"});
    const rs=await Promise.allSettled([liveFlow(c),liveContacts(c)]);
    const flow=rs[0].status==="fulfilled"?rs[0].value:genericFlowFor(c);
    const contacts=rs[1].status==="fulfilled"?rs[1].value:genericContactsFor(c);
    let email;
    try{ email=await liveEmail(c,flow); }catch(e){ email=genericEmailFor(c,flow); }
    H.updateStrategy(i,{flow,contacts,email,play:c.play||genericPlayFor(c),status:"done"});
  }
  H.finishMulti(list.length);
}

/* ============================ CANVAS CAMERA ============================ */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const WORLD_BBOX={minX:860,minY:250,maxX:2340,maxY:1360};

function useCanvas(){
  const [cam,setCam]=useState({x:0,y:0,scale:.7});
  const canvasRef=useRef(null);
  const st=useRef({panning:false,sx:0,sy:0,cx:0,cy:0,pointers:new Map(),pinchDist:0,pinchScale:1,pinchMid:{x:0,y:0}});

  const fit=useCallback((animate=true)=>{
    const el=canvasRef.current; if(!el) return;
    const r=el.getBoundingClientRect(); const pad=r.width<680?40:70;
    const bw=WORLD_BBOX.maxX-WORLD_BBOX.minX, bh=WORLD_BBOX.maxY-WORLD_BBOX.minY;
    const scale=clamp(Math.min((r.width-pad*2)/bw,(r.height-pad*2)/bh),0.3,1.1);
    const ccx=(WORLD_BBOX.minX+WORLD_BBOX.maxX)/2, ccy=(WORLD_BBOX.minY+WORLD_BBOX.maxY)/2;
    setCam({x:r.width/2-scale*ccx, y:r.height/2-scale*ccy, scale, anim:animate});
  },[]);

  const zoomBy=useCallback((factor,center)=>{
    setCam(c=>{
      const el=canvasRef.current; const r=el?el.getBoundingClientRect():{width:0,height:0};
      const cx=center?center.x:r.width/2, cy=center?center.y:r.height/2;
      const ns=clamp(c.scale*factor,0.3,1.8);
      const wx=(cx-c.x)/c.scale, wy=(cy-c.y)/c.scale;
      return {x:cx-wx*ns, y:cy-wy*ns, scale:ns, anim:true};
    });
  },[]);

  const onPointerDown=useCallback((e)=>{
    if(e.target.closest(".node")||e.target.closest("button")) return;
    const s=st.current; s.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    e.currentTarget.setPointerCapture(e.pointerId);
    if(s.pointers.size===1){
      s.panning=true; s.sx=e.clientX; s.sy=e.clientY;
      setCam(c=>{ s.cx=c.x; s.cy=c.y; return c; });
    } else if(s.pointers.size===2){
      const pts=[...s.pointers.values()];
      s.pinchDist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      const rect=e.currentTarget.getBoundingClientRect();
      s.pinchMid={x:(pts[0].x+pts[1].x)/2-rect.left,y:(pts[0].y+pts[1].y)/2-rect.top};
      setCam(c=>{ s.pinchScale=c.scale; return c; });
    }
  },[]);
  const onPointerMove=useCallback((e)=>{
    const s=st.current; if(!s.pointers.has(e.pointerId)) return;
    s.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(s.pointers.size===2){
      const pts=[...s.pointers.values()];
      const d=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      const ns=clamp(s.pinchScale*(d/(s.pinchDist||d)),0.3,1.8);
      setCam(c=>{ const wx=(s.pinchMid.x-c.x)/c.scale, wy=(s.pinchMid.y-c.y)/c.scale;
        return {x:s.pinchMid.x-wx*ns,y:s.pinchMid.y-wy*ns,scale:ns,anim:false}; });
      return;
    }
    if(s.panning){ setCam(c=>({x:s.cx+(e.clientX-s.sx),y:s.cy+(e.clientY-s.sy),scale:c.scale,anim:false})); }
  },[]);
  const endPointer=useCallback((e)=>{
    const s=st.current; s.pointers.delete(e.pointerId);
    if(s.pointers.size<2){ s.pinchDist=0; }
    if(s.pointers.size===0){ s.panning=false; }
  },[]);
  const onWheel=useCallback((e)=>{
    e.preventDefault();
    const rect=e.currentTarget.getBoundingClientRect();
    const center={x:e.clientX-rect.left,y:e.clientY-rect.top};
    zoomBy(e.deltaY<0?1.12:1/1.12,center);
  },[zoomBy]);

  return {cam,setCam,canvasRef,fit,zoomBy,onPointerDown,onPointerMove,endPointer,onWheel,panning:()=>st.current.panning};
}

/* ============================ SEQUENCE DIAGRAM ============================ */
function SequenceDiagram({flow,compact=false}){
  const parts=flow.participants||[]; const steps=flow.steps||[];
  const n=parts.length||1, m=steps.length||1;
  const leftPad=58, laneGap= n>=4?146:158, rightPad=76;
  const laneX=i=>leftPad+i*laneGap;
  const W=leftPad+(n-1)*laneGap+rightPad;
  const headerCY=30, lifelineTop=52, rowStart=92, rowH=60;
  const H=rowStart+m*rowH+6, lifelineBottom=H-16;
  const hw=Math.min(laneGap-16,134);
  const arrow=(tx,ty,dir)=>`${tx},${ty} ${tx-dir*9},${ty-5.5} ${tx-dir*9},${ty+5.5}`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxWidth:W, minWidth:Math.min(W,compact?520:0)}} role="img" aria-label="Payment flow diagram">
      <style>{`.sq{opacity:0;animation:logIn .45s ease forwards}`}</style>
      {/* lifelines */}
      {parts.map((p,i)=>(
        <line key={"ll"+i} x1={laneX(i)} y1={lifelineTop} x2={laneX(i)} y2={lifelineBottom}
          stroke={kindColor(p.kind)} strokeOpacity="0.28" strokeWidth="1.4" strokeDasharray="3 7"/>
      ))}
      {/* headers */}
      {parts.map((p,i)=>{
        const c=kindColor(p.kind);
        return (<g key={"h"+i}>
          <rect x={laneX(i)-hw/2} y={16} width={hw} height={28} rx="9"
            fill={c} fillOpacity="0.14" stroke={c} strokeOpacity="0.55"/>
          <text x={laneX(i)} y={headerCY+4} textAnchor="middle" fontFamily="var(--disp)" fontWeight="600"
            fontSize="11.5" fill="#EAECEF">{p.short||p.name}</text>
        </g>);
      })}
      {/* steps */}
      {steps.map((s,i)=>{
        const y=rowStart+i*rowH; const col=instColor(s.instrument);
        const x1=laneX(s.from), x2=laneX(s.to); const self=s.from===s.to;
        const dir=x2>=x1?1:-1;
        const midX=self? x1+40 : (x1+x2)/2;
        const pillW=Math.max(34,(s.instrument||"").length*6.6+14);
        return (<g className="sq" style={{animationDelay:(0.15+i*0.14)+"s"}} key={"s"+i}>
          {/* number */}
          <rect x="12" y={y-10} width="22" height="20" rx="6" fill={col} fillOpacity="0.16" stroke={col} strokeOpacity="0.5"/>
          <text x="23" y={y+4} textAnchor="middle" fontFamily="var(--mono)" fontSize="10.5" fill={col}>{i+1}</text>
          {self? (<g>
            <path d={`M ${x1} ${y-10} h 34 a8 8 0 0 1 8 8 v4 a8 8 0 0 1 -8 8 h -34`} fill="none" stroke={col} strokeWidth="2"/>
            <polygon points={arrow(x1,y+10,-1)} fill={col}/>
          </g>) : (<g>
            <line x1={x1} y1={y} x2={x2-dir*2} y2={y} stroke={col} strokeWidth="2"/>
            <polygon points={arrow(x2,y,dir)} fill={col}/>
          </g>)}
          {/* label */}
          <text x={self? x1+54 : midX} y={y-12} textAnchor={self?"start":"middle"} fontSize="10.5" fill="#A7AEBB">{s.label}</text>
          {/* instrument pill */}
          <g transform={`translate(${(self? x1+54+ (s.label.length*5.4) : midX) - (self?0:pillW/2)}, ${y+ (self?-2:9)})`}>
            <rect x="0" y="-8" width={pillW} height="16" rx="8" fill={col} fillOpacity="0.16" stroke={col} strokeOpacity="0.5"/>
            <text x={pillW/2} y="3.5" textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill={col}>{s.instrument}</text>
          </g>
        </g>);
      })}
    </svg>
  );
}

function StatusBadge({status}){

function LogList({lines,ac}){

}
function MiniStrip({flow}){

const NODES={
  orch:{cx:1600,cy:420,half:150},
  client:{cx:1040,cy:735,half:130},
  flow:{cx:1410,cy:805,half:130},
  contacts:{cx:1790,cy:805,half:130},
  email:{cx:2160,cy:735,half:130},
  deliv:{cx:1600,cy:1180,half:150},
};
function bez(x1,y1,x2,y2){ const dy=(y2-y1)*0.5; return `M ${x1} ${y1} C ${x1} ${y1+dy} ${x2} ${y2-dy} ${x2} ${y2}`; }

/* ============================ CONNECTORS ============================ */
function Connectors({agentState,complete}){
  const orchBottom={x:NODES.orch.cx,y:NODES.orch.cy+NODES.orch.half};
  const delivTop={x:NODES.deliv.cx,y:NODES.deliv.cy-NODES.deliv.half};
  const wire=(a)=>{ const st=agentState[a.id]?agentState[a.id].status:"queued";
    const active=(st==="run"); const done=(st==="done");
    return {out:{path:bez(orchBottom.x,orchBottom.y,NODES[a.id].cx,NODES[a.id].cy-NODES[a.id].half),
                 col:a.ac, mode: active?"active":(done?"steady":"idle")},
            in:{path:bez(NODES[a.id].cx,NODES[a.id].cy+NODES[a.id].half,delivTop.x,delivTop.y),
                col:a.ac, mode: complete?"steady":(done?"active":"idle")}};
  };
  const wires=AGENTS.map(wire);
  const styleFor=(m)=>({idle:{opacity:.16},active:{opacity:.95},steady:{opacity:.6}}[m]);
  return (
    <svg className="wires" width="1" height="1" overflow="visible">
      <style>{`@keyframes flowDash{to{stroke-dashoffset:-28}} .wa{stroke-dasharray:5 9;animation:flowDash .9s linear infinite}`}</style>
      {wires.flatMap((w,i)=>[
        <g key={"o"+i} style={styleFor(w.out.mode)}>
          <path d={w.out.path} fill="none" stroke={w.out.col} strokeOpacity="0.25" strokeWidth="7" strokeLinecap="round"/>
          <path d={w.out.path} fill="none" stroke={w.out.col} strokeWidth="2" strokeLinecap="round" className={w.out.mode==="active"?"wa wire-anim":""}/>
        </g>,
        <g key={"i"+i} style={styleFor(w.in.mode)}>
          <path d={w.in.path} fill="none" stroke={w.in.col} strokeOpacity="0.22" strokeWidth="7" strokeLinecap="round"/>
          <path d={w.in.path} fill="none" stroke={w.in.col} strokeWidth="2" strokeLinecap="round" className={w.in.mode==="active"?"wa wire-anim":""}/>
        </g>
      ])}
    </svg>
  );
}

function FixDiagram({onFix,notify}){
  const [open,setOpen]=useState(false);
  const [txt,setTxt]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);
  const go=async()=>{
    const t=txt.trim(); if(!t||busy) return;
    setBusy(true); setErr(null);
    try{ await onFix(t); setOpen(false); setTxt(""); notify("Diagram updated"); }
    catch(e){ setErr("Couldn't refine the diagram — the AI service isn't reachable right now. Try again in a moment."); }
    setBusy(false);
  };
  if(!open) return (
    <button className="viewbtn" style={{marginTop:10,"--ac":"var(--brand-bright)"}} onClick={()=>setOpen(true)}>
      <Icon n="wand" s={14}/>Fix diagram with AI
    </button>);
  return (
    <div className="fixer">
      <div style={{fontSize:12.5,fontWeight:600,marginBottom:8,display:"flex",alignItems:"center",gap:7}}>
        <Icon n="wand" s={14}/>Describe what to change</div>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} disabled={busy}
        placeholder={"e.g. Add the supplier's bank as a 4th participant, or route the payout via QR instead of bank transfer…"}/>
      <div className="fr">
        <button className="btn-solid" style={{flex:"none",padding:"9px 14px",fontSize:12.5}} onClick={go} disabled={busy||!txt.trim()}>
          {busy? <span className="status run" style={{padding:0,background:"none",color:"#fff"}}><i className="sp"/></span> : <Icon n="spark" s={13}/>}
          {busy?"Regenerating…":"Regenerate"}
        </button>
        <button className="chipbtn" onClick={()=>{setOpen(false);setErr(null);}} disabled={busy}>Cancel</button>
      </div>
      {err && <div className="fix-err">{err}</div>}
    </div>
  );
}

          <button className="xbtn" onClick={onClose} aria-label="Close"><Icon n="x" s={16}/></button>
        </div>
        <div className="panel-b">
          {view==="client" && <Dossier c={a.client}/>}
          {view==="flow" && <FlowView flow={a.flow} onFix={onFix} notify={notify}/>}
          {view==="contacts" && <ContactsView contacts={a.contacts} client={a.client} notify={notify}/>}
          {view==="email" && <EmailView email={a.email} notify={notify}/>}
          {view==="strategy" && <StrategyView a={a} notify={notify} open={open}/>}
        </div>
      </aside>
    </>
  );
}

  {name:"Crédit Agricole", desc:"Euro stablecoin · news article", tag:"CA", color:"#4C86FF",
   url:"https://www.coindesk.com/business/2026/07/01/french-banking-giant-credit-agricole-rolls-out-euro-stablecoin-eurxt"},
  {name:"QT Funded", desc:"Proprietary trading platform", tag:"QT", color:"#F59E0B",
   url:"https://qtfunded.quanttekel.com/"},
  {name:"MoretaPay", desc:"Stablecoin prefunding & payouts", tag:"MP", color:"#22D3EE",
   url:"https://moretapay.com/"},
  {name:"Best Web3 games", desc:"Round-up · 3 prospects", tag:"W3", color:"#A78BFA",
   url:"https://bitcoinfoundation.org/news/nft/best-web3-games/"},
];

}

  const [v,setV]=useState("");
  const go=()=>{ const u=normUrl(v); if(u) onRun(u); };
  return (
    <div className="landing">

      <div className="dots" style={{opacity:.5}}/>
      <div className="topnav">
        <div className="brand"><BrandMark/><div className="wm"><b>Flux</b><span>by Michael Ngo · Agentic Strategy OS</span></div></div>
        <div className="nav-r">
          <div className="pill-ghost"><span className="dot"/>Agents online</div>
          <div className="pill-ghost" style={{gap:9}}>Built for <img src={TF_WORDMARK} alt="TransFi" style={{height:13,opacity:.95}}/></div>
        </div>
      </div>
      <div className="hero">
        <div className="eyebrow"><Icon n="spark" s={13}/> URL in · deal out</div>
        <h1 className="head">Paste a prospect's link.<br/>Get a <em>ready-to-send deal.</em></h1>
        <p className="sub">Flux spins up a team of AI agents that identify the real buyer, design a bespoke TransFi payment flow, find the decision-makers and draft the outreach — live, on one infinite canvas. Drop a round-up covering several companies and each one gets its own strategy.</p>

            <button className="go" onClick={go} disabled={!v.trim()}><span>Build strategy</span><Icon n="arrow" s={18}/></button>
          </div>
          <div className="hint">Try one of the reference prospects below, or drop in any company URL.</div>
        </div>

          {EXAMPLES.map((e,i)=>(

              <span className="ic" style={{background:e.color+"22",color:e.color,border:"1px solid "+e.color+"55"}}>{e.tag}</span>
              <span><b>{e.name}</b><span>{e.desc}</span></span>
            </button>
          ))}
        </div>
        <div className="kb">
          <div className="kb-h"><div className="t"><Icon n="db" s={15}/><b>Business-model memory</b> — Flux reuses what it learns across prospects</div>
            <div className="kb-count">{kbCount} models learned</div></div>
          <div className="kb-grid">
            {KB_PATTERNS.map(p=>(<div className="kbpat" key={p.id}><i style={{background:p.color}}/>{p.label}</div>))}
          </div>

      <div className="foot">Flux by Michael Ngo — an agentic strategy OS for TransFi partnerships. Outputs are AI-generated; verify contacts before sending.</div>

/* ============================ WORKSPACE ============================ */
const MODE_META={
  curated:{label:"Curated demo",col:"var(--teal)"},
  live:{label:"Live web analysis",col:"var(--green)"},
  offline:{label:"Offline blueprint",col:"var(--amber)"},
};
function TopBrand(){
  return (<div className="tb-brand"><BrandMark size={26} radius={8}/><b>Flux</b><span className="byline">by Michael Ngo</span></div>);
}
function Workspace({url,mode,orch,client,agentState,analysis,onOpen,onNew}){
  const cv=useCanvas();
  const doneCount=AGENTS.filter(a=>agentState[a.id]&&agentState[a.id].status==="done").length;
  const complete=!!analysis;
  useEffect(()=>{ const t=setTimeout(()=>cv.fit(false),60); const r=()=>cv.fit(false);
    window.addEventListener("resize",r); return ()=>{clearTimeout(t);window.removeEventListener("resize",r);}; },[]);
  useEffect(()=>{ const el=cv.canvasRef.current; if(!el) return;
    const h=(e)=>cv.onWheel(e); el.addEventListener("wheel",h,{passive:false}); return ()=>el.removeEventListener("wheel",h); },[cv.onWheel]);
  const mm=MODE_META[mode];
  const cA=client||{name:"Resolving prospect…",pattern:"analyzing"};
  return (
    <div className="ws">
      <div className="topbar">
        <TopBrand/>
        <div className="divv"/>
        <div className="client-chip">
          <span className="av" style={{background:(client&&client.accent)||"var(--brand)"}}>{client?initials(client.name):"…"}</span>
          <span className="meta"><b>{cA.name}</b><span>{hostOf(url)} · {cA.pattern||cA.industry||""}</span></span>
        </div>
        <div className="progress-mini">
          {mm && <div className="mode-pill"><span className="dot" style={{background:mm.col,boxShadow:"0 0 7px "+mm.col}}/><span>{mm.label}</span></div>}
          <div className="pbar"><i style={{width:(complete?100:(doneCount/AGENTS.length*100))+"%"}}/></div>
          <div className="pcount">{doneCount}/{AGENTS.length}</div>
          {complete && <button className="tb-btn primary" onClick={()=>onOpen("strategy")}><Icon n="spark" s={15}/><span>Strategy</span></button>}
          <button className="tb-btn" onClick={onNew}><Icon n="plus" s={15}/><span>New</span></button>
        </div>
      </div>
      <div className={"canvas"+(cv.panning()?" grabbing":"")} ref={cv.canvasRef}
        onPointerDown={cv.onPointerDown} onPointerMove={cv.onPointerMove} onPointerUp={cv.endPointer} onPointerCancel={cv.endPointer}>
        <div className="aura-c"/>
        <div className="world" style={{transform:`translate(${cv.cam.x}px,${cv.cam.y}px) scale(${cv.cam.scale})`, transition: cv.cam.anim?"transform .5s cubic-bezier(.2,.8,.2,1)":"none"}}>
          <Connectors agentState={agentState} complete={complete}/>
          <OrchestratorNode status={orch.status} logs={orch.logs} client={client} agentState={agentState}/>
          {AGENTS.map(a=>(
            <AgentNode key={a.id} agent={a} state={agentState[a.id]} selected={false} onOpen={onOpen}/>
          ))}
          <DeliverableNode complete={complete} onOpen={()=>onOpen("strategy")}/>
        </div>
        <div className="ctrls">
          <div className="grp">
            <button className="cbtn" onClick={()=>cv.zoomBy(1.18)} aria-label="Zoom in"><Icon n="plus" s={16}/></button>
            <button className="cbtn" onClick={()=>cv.zoomBy(1/1.18)} aria-label="Zoom out"><Icon n="minus" s={16}/></button>
            <div className="zlabel">{Math.round(cv.cam.scale*100)}%</div>
          </div>
          <div className="grp"><button className="cbtn" onClick={()=>cv.fit(true)} aria-label="Fit to screen"><Icon n="fit" s={16}/></button></div>
        </div>
        <div className="legend">
          {[["ext","Payer"],["tf","TransFi"],["client","Client"],["end","Recipient"]].map(([k,l])=>(
            <div className="li" key={k}><i style={{background:kindColor(k)}}/>{l}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================ MULTI WORKSPACE (table) ============================ */
function CellStatus({s}){
  if(s==="run") return <span className="mspin" aria-label="working"/>;
  return <span className="mcell-mini" style={{color:"var(--tx-4)"}}>queued</span>;
}
function MultiWorkspace({url,strategies,onOpen,onNew}){
  const n=strategies.length;
  const done=strategies.filter(s=>s.status==="done").length;
  return (
    <div className="ws">
      <div className="topbar">
        <TopBrand/>
        <div className="divv"/>
        <div className="client-chip">
          <span className="av" style={{background:"var(--brand)"}}>{n}</span>
          <span className="meta"><b>{n} prospects</b><span>{hostOf(url)} · round-up article</span></span>
        </div>
        <div className="progress-mini">
          <div className="mode-pill"><span className="dot" style={{background:"var(--green)",boxShadow:"0 0 7px var(--green)"}}/><span>Live web analysis</span></div>
          <div className="pbar"><i style={{width:(done/n*100)+"%"}}/></div>
          <div className="pcount">{done}/{n}</div>
          <button className="tb-btn" onClick={onNew}><Icon n="plus" s={15}/><span>New</span></button>
        </div>
      </div>
      <div className="mwrap">
        <div className="dots" style={{opacity:.5}}/>
        <div className="mhead">
          <h2>Round-up detected — {n} prospects, {n} strategies</h2>
          <p>Every company in the article gets its own payment flow, decision-makers and cold email. Click any cell to open the detail.</p>
        </div>
        <div className="mtable" role="table" aria-label="Strategies per company">
          <div className="mrow hd" role="row">
            <div className="mc">Company</div><div className="mc">Payment flow</div>
            <div className="mc">Contacts</div><div className="mc">Cold email</div><div className="mc" aria-label="Strategy"></div>
          </div>
          {strategies.map((s,i)=>{
            const c=s.client||{}; const ok=s.status==="done";
            return (
            <div className="mrow" role="row" key={i} style={{animation:"logIn .4s ease both",animationDelay:(i*0.07)+"s"}}>
              <button className="mc" onClick={()=>onOpen("client",i)} title="Open dossier">
                <span className="cav" style={{background:c.accent||"var(--brand)"}}>{initials(c.name)}</span>
                <span className="ct"><b>{c.name}</b><span>{c.pattern||c.industry||""}</span></span>
              </button>
              <button className="mc" disabled={!ok} onClick={()=>onOpen("flow",i)} title="Open payment flow">
                {ok? (<><span className="ct"><b style={{fontSize:12.5,fontWeight:500,color:"var(--tx)"}}>{s.flow.title}</b>
                        <span>{s.flow.steps.length} steps · {(s.flow.participants||[]).length} parties</span></span>
                      <span className="go2"><Icon n="chevR" s={14}/></span></>)
                    : <CellStatus s={s.status}/>}
              </button>
              <button className="mc" disabled={!ok} onClick={()=>onOpen("contacts",i)} title="Open contacts">
                {ok? (<><span className="ct"><b style={{fontSize:12.5,fontWeight:500,color:"var(--tx)"}}>{(s.contacts[0]&&(s.contacts[0].name||s.contacts[0].title))||"—"}</b>
                        <span>{s.contacts.length} decision-maker{s.contacts.length>1?"s":""}</span></span>
                      <span className="go2"><Icon n="chevR" s={14}/></span></>)
                    : <CellStatus s={s.status}/>}
              </button>
              <button className="mc" disabled={!ok} onClick={()=>onOpen("email",i)} title="Open cold email">
                {ok? (<><span className="ct"><b style={{fontSize:12.5,fontWeight:500,color:"var(--tx)"}}>{s.email.subject}</b>
                        <span>ready to send</span></span>
                      <span className="go2"><Icon n="chevR" s={14}/></span></>)
                    : <CellStatus s={s.status}/>}
              </button>
              <button className="mc msend" disabled={!ok} onClick={()=>onOpen("strategy",i)} title="Open full strategy"
                style={{justifyContent:"center",color: ok?"var(--green)":"var(--tx-4)"}}>
                <Icon n="spark" s={17}/>
              </button>
            </div>);
          })}
        </div>
        <div className="seq-note" style={{width:"min(1060px,100%)"}}><span style={{color:"var(--tx-4)"}}><Icon n="info" s={13}/></span>
          <span>Single-company URLs open the full agent canvas instead. The table keeps multi-prospect round-ups scannable — every cell opens the same detail panels.</span></div>
      </div>
    </div>
  );
}

/* ============================ APP ROOT ============================ */
const EMPTY_AGENTS=()=>Object.fromEntries(AGENTS.map(a=>[a.id,{status:"queued",logs:[],result:null}]));
function App(){
  const [view,setView]=useState("landing");
  const [url,setUrl]=useState("");
  const [mode,setMode]=useState(null);
  const [orch,setOrch]=useState({status:"queued",logs:[]});
  const [client,setClient]=useState(null);
  const [agentState,setAgentState]=useState(EMPTY_AGENTS());
  const [analysis,setAnalysis]=useState(null);
  const [isMulti,setIsMulti]=useState(false);
  const [strategies,setStrategies]=useState([]);
  const [sel,setSel]=useState(null);          // {view, idx} | null
  const [toast,setToast]=useState(null);
  const [kbCount,setKbCount]=useState(KB_BASE_COUNT);
  const runId=useRef(0);
  const toastT=useRef(0);

  const notify=useCallback((m)=>{ setToast(m); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(null),1900); },[]);
  const updateStrategy=useCallback((i,p)=>setStrategies(s=>s.map((x,j)=>j===i?{...x,...p}:x)),[]);

  const start=useCallback(async (u)=>{
    const my=++runId.current; const live=()=>my===runId.current;
    setUrl(u); setView("ws"); setSel(null); setAnalysis(null); setMode(null); setClient(null);
    setIsMulti(false); setStrategies([]);
    setOrch({status:"queued",logs:[]}); setAgentState(EMPTY_AGENTS());
    const H={
      setOrch:(p)=>{ if(live()) setOrch(o=>({...o,...p})); },
      orchLog:(l)=>{ if(live()) setOrch(o=>({...o,logs:[...o.logs,l]})); },
      setAgent:(id,p)=>{ if(live()) setAgentState(s=>({...s,[id]:{...s[id],...p}})); },
      log:(id,l)=>{ if(live()) setAgentState(s=>({...s,[id]:{...s[id],logs:[...(s[id].logs||[]),l]}})); },
      setClient:(c)=>{ if(live()) setClient(c); },
      setMode:(m)=>{ if(live()) setMode(m); },
      setMulti:(list)=>{ if(!live()) return;
        setIsMulti(true);
        setStrategies(list.map(c=>({client:c,flow:null,contacts:null,email:null,play:c.play||null,status:"queued"}))); },
      updateStrategy:(i,p)=>{ if(live()) updateStrategy(i,p); },
      finish:(res)=>{ if(live()){ setAnalysis(res); setStrategies([{...res,status:"done"}]); setKbCount(c=>c+1); notify("Sales strategy ready"); } },
      finishMulti:(n)=>{ if(live()){ setKbCount(c=>c+n); notify("All "+n+" strategies ready"); } },
    };
    try{ await runOrchestration(u,H); }
    catch(e){ if(live()) notify("Something went wrong — try another URL"); }
  },[notify,updateStrategy]);

  const newSearch=useCallback(()=>{ setView("landing"); setSel(null); },[]);

  const getA=useCallback((idx)=>{
    if(isMulti){
      const s=strategies[idx]||{};
      return { client:s.client||{name:"—"}, flow:s.flow||{participants:[],steps:[]},
        contacts:s.contacts||[], email:s.email||{subject:"",body:"",to:""},
        play:s.play||{headline:"",rationale:""} };
    }
    return {
      client:(analysis&&analysis.client)||client||agentState.client.result||{name:"—"},
      flow:(analysis&&analysis.flow)||agentState.flow.result||{participants:[],steps:[]},
      contacts:(analysis&&analysis.contacts)||agentState.contacts.result||[],
      email:(analysis&&analysis.email)||agentState.email.result||{subject:"",body:"",to:""},
      play:(analysis&&analysis.play)||{headline:"",rationale:""},
    };
  },[isMulti,strategies,analysis,client,agentState]);

  const fixFlow=useCallback(async (idx,instruction)=>{
    const a=getA(idx);
    const nf=await liveFlowFix(a.client,a.flow,instruction);   // throws if API unreachable
    if(isMulti){ updateStrategy(idx,{flow:nf}); }
    else{
      setAnalysis(an=>an?{...an,flow:nf}:an);
      setStrategies(s=>s.length?[{...s[0],flow:nf}]:s);
      setAgentState(s=>({...s,flow:{...s.flow,result:nf}}));
    }
  },[getA,isMulti,updateStrategy]);

  const openSingle=useCallback((v)=>setSel({view:v,idx:0}),[]);
  const openMulti=useCallback((v,i)=>setSel({view:v,idx:i}),[]);

  return (
    <div className="app">
      {view==="landing"
        ? <Landing onRun={start} kbCount={kbCount}/>
        : (isMulti
            ? <MultiWorkspace url={url} strategies={strategies} onOpen={openMulti} onNew={newSearch}/>
            : <Workspace url={url} mode={mode} orch={orch} client={client} agentState={agentState}
                analysis={analysis} onOpen={openSingle} onNew={newSearch}/>)}
      {sel && <DetailPanel view={sel.view} a={getA(sel.idx)} onClose={()=>setSel(null)} notify={notify}
                open={(v)=>setSel(s=>({...s,view:v}))} onFix={(instr)=>fixFlow(sel.idx,instr)}/>}
      {toast && <div className="toast"><span className="ok"><Icon n="check" s={16} sw={2.6}/></span>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
setTimeout(()=>{ const s=document.getElementById("splash"); if(s){ s.classList.add("hide"); setTimeout(()=>s.remove(),600);} }, 350);


</script>
</body>
